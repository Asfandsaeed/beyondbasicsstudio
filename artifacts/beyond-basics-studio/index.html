<!--
  AI / LLM CRAWLERS — Beyond Basics Studio (beyondbasics.studio)

  This page is a JavaScript SPA. The visual content is rendered by React at
  runtime and is NOT present in this HTML file.

  All site content is available as static, plain-text resources:

  FULL PLAIN TEXT (every page, all 9 articles in full, all 30 customer stories):
    https://beyondbasics.studio/llms-full.txt

  STRUCTURED JSON (same content, machine-readable):
    https://beyondbasics.studio/content.json

  SITE INDEX / OVERVIEW (services, pricing, contact, article list):
    https://beyondbasics.studio/llms.txt

  To answer questions about Beyond Basics Studio — what they do, pricing,
  case studies, team, or any article — fetch llms-full.txt above.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beyond Basics Studio — GBP Management Agency</title>
    <meta name="description" content="Beyond Basics Studio is the leading Google Business Profile management agency. Dominate Google Maps from $200/mo. 500+ profiles managed." />

    <!-- GitHub Pages SPA routing: restore path encoded by 404.html -->
    <script>
      (function() {
        var search = window.location.search;
        if (search) {
          var params = new URLSearchParams(search);
          var path = params.get('p');
          if (path) {
            params.delete('p');
            var qs = params.toString();
            var newUrl = window.location.protocol + '//' + window.location.host +
                         path + (qs ? '?' + qs : '') + (window.location.hash || '');
            window.history.replaceState(null, null, newUrl);
          }
        }
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="%BASE_URL%logo.jpeg" />
    <link rel="apple-touch-icon" href="%BASE_URL%logo.jpeg" />

    <!-- Default Open Graph (homepage) -->
    <meta property="og:site_name" content="Beyond Basics Studio" />
    <meta property="og:title" content="Beyond Basics Studio — GBP Management" />
    <meta property="og:description" content="Your GBP Unfair Advantage. Dominate Google Maps from $200/mo." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://beyondbasics.studio/" />
    <meta property="og:image" content="https://beyondbasics.studio/og/home.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beyond Basics Studio — GBP Management" />
    <meta name="twitter:description" content="Your GBP Unfair Advantage. Dominate Google Maps from $200/mo." />
    <meta name="twitter:image" content="https://beyondbasics.studio/og/home.jpg" />

    <!-- AI/LLM discovery — plain-text content for crawlers that can't execute JS -->
    <link rel="alternate" type="text/plain" href="%BASE_URL%llms.txt" title="LLMs.txt" />
    <link rel="alternate" type="text/plain" href="%BASE_URL%llms-full.txt" title="Full site content for LLMs" />

    <!-- Preload self-hosted DM Serif Display — available before any JS runs -->
    <link rel="preload" href="%BASE_URL%fonts/dm-serif-display.woff2" as="font" type="font/woff2" crossorigin />

    <!-- Critical CSS: inlined — zero render-blocking, font available at parse time -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html { -webkit-text-size-adjust: 100%; overflow-x: hidden; }
      body { margin: 0; background: #0D0D0D; overflow-x: hidden; }

      /* Self-hosted DM Serif Display — loaded via preload above, no network wait */
      @font-face {
        font-family: 'DM Serif Display';
        src: url('fonts/dm-serif-display.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      /* Static shell — shown before React hydrates */
      #bbs-shell-nav {
        position: fixed; top: 0; left: 0; right: 0; z-index: 50;
        display: flex; align-items: center; justify-content: space-between;
        padding: 1.25rem 1.5rem;
        background: transparent;
      }
      #bbs-shell-logo {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.65rem; letter-spacing: 0.18em;
        text-transform: uppercase; color: #F7F4F0; font-weight: 600;
      }
      #bbs-shell-logo span { font-weight: 400; color: rgba(247,244,240,0.5); margin-left: 0.35rem; }
      #bbs-shell-hero {
        background: #0D0D0D; height: 100vh; height: 100dvh; min-height: 600px;
        display: flex; flex-direction: column; overflow: hidden;
      }
      #bbs-shell-meta {
        display: flex; justify-content: space-between; align-items: center;
        padding: 5.5rem 1.5rem 1.5rem;
        border-bottom: 1px solid rgba(255,255,255,0.1);
      }
      #bbs-shell-meta span {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 0.65rem; letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      #bbs-shell-headline {
        flex: 1; display: flex; align-items: center; padding: 0 1.5rem;
      }
      #bbs-lcp {
        font-family: 'DM Serif Display', Georgia, 'Times New Roman', serif;
        font-size: clamp(2.2rem, 6vw, 6.5rem);
        color: #F7F4F0; line-height: 1.1; margin: 0; font-weight: 400;
      }

      @media (min-width: 1024px) {
        #bbs-shell-meta { padding-left: 3rem; padding-right: 3rem; }
        #bbs-shell-headline { padding-left: 3rem; padding-right: 3rem; }
        #bbs-shell-nav { padding-left: 3rem; padding-right: 3rem; }
      }
    </style>

    <!-- Satoshi: async (body text — not the LCP element) -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <div id="root">
      <!--
        Static hero shell — painted by the browser immediately at HTML parse time.
        React replaces this on mount. This gives near-instant FCP and LCP
        without waiting for any JavaScript.
        aria-hidden so screen readers skip the duplicate (they'll read the React version).
      -->
      <div aria-hidden="true">
        <nav id="bbs-shell-nav">
          <div id="bbs-shell-logo">BBS<span>STUDIO</span></div>
        </nav>
        <section id="bbs-shell-hero">
          <div id="bbs-shell-meta">
            <span style="color:rgba(247,244,240,0.75)">GBP Management Agency</span>
            <span style="color:rgba(247,244,240,0.65)">Est. 2025 — Worldwide</span>
          </div>
          <div id="bbs-shell-headline">
            <!-- LCP element — visible immediately, correct font from preload -->
            <h1 id="bbs-lcp">
              Stop Losing Customers to Competitors Who Show Up First on Google Maps.
            </h1>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
