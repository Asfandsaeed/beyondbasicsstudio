kind = "web"
previewPath = "/"
title = "Beyond Basics Studio"
version = "1.0.0"
id = "artifacts/beyond-basics-studio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20400

[services.development]
run = "pnpm --filter @workspace/beyond-basics-studio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/beyond-basics-studio", "run", "build" ]
publicDir = "artifacts/beyond-basics-studio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20400"
BASE_PATH = "/"
