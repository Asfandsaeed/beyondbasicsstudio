<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <script>
    // GitHub Pages SPA fallback — redirect to index.html preserving the path
    // so that routes like /journal/my-slug work when accessed directly.
    var l = window.location;
    var base = '';
    var path = l.pathname.replace(base, '') || '/';
    var search = l.search ? l.search + '&' : '?';
    var hash = l.hash || '';
    // Redirect to root with the path encoded as a query param
    l.replace(
      l.protocol + '//' + l.host + base + '/?' + search + 'p=' + encodeURIComponent(path) + hash
    );
  </script>
</head>
<body></body>
</html>
